# =============================================
# DOCKER COMPOSE DEVELOPMENT - LIBRARY MANAGEMENT SYSTEM
# =============================================

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: library-mysql-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: library_management_system
      MYSQL_USER: library_user
      MYSQL_PASSWORD: library_password
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "3306:3306"
    volumes:
      - mysql_dev_data:/var/lib/mysql
      - ./database_design.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./database_init.sql:/docker-entrypoint-initdb.d/setup.sql:ro
    networks:
      - library_dev_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      timeout: 20s
      retries: 10
    command: --default-authentication-plugin=mysql_native_password

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: library-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    networks:
      - library_dev_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Backend Node.js API (Development)
  backend-node:
    build:
      context: ./backend-node
      dockerfile: Dockerfile
      target: development
    container_name: library-backend-node-dev
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=library_management_system
      - JWT_SECRET=development_jwt_secret_key_123456789
      - FRONTEND_URL=http://localhost:3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "3001:3001"
      - "9229:9229" # Debug port
    volumes:
      - ./backend-node:/app
      - /app/node_modules
      - backend_node_dev_uploads:/app/uploads
      - backend_node_dev_logs:/app/logs
    networks:
      - library_dev_network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run dev
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Backend Spring Boot API (Development)
  backend-spring:
    build:
      context: ./backend-spring
      dockerfile: Dockerfile
    container_name: library-backend-spring-dev
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=development
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=library_management_system
      - JWT_SECRET=development_jwt_secret_key_123456789
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:3001
    ports:
      - "3002:3002"
      - "5005:5005" # Debug port
    volumes:
      - ./backend-spring/src:/app/src
      - backend_spring_dev_logs:/app/logs
    networks:
      - library_dev_network
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Frontend React (Development)
  frontend-react:
    build:
      context: ./frontend-react
      dockerfile: Dockerfile
      target: development
    container_name: library-frontend-react-dev
    restart: unless-stopped
    environment:
      - REACT_APP_API_URL=http://localhost:3001
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "3000:3000"
    volumes:
      - ./frontend-react/src:/app/src
      - ./frontend-react/public:/app/public
      - /app/node_modules
    networks:
      - library_dev_network
    depends_on:
      - backend-node
    command: npm start
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # phpMyAdmin (Database Management)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: library-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: rootpassword
    ports:
      - "8080:80"
    networks:
      - library_dev_network
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_dev_data:
    driver: local
  redis_dev_data:
    driver: local
  backend_node_dev_uploads:
    driver: local
  backend_node_dev_logs:
    driver: local
  backend_spring_dev_logs:
    driver: local

networks:
  library_dev_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
