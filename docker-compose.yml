# =============================================
# DOCKER COMPOSE - LIBRARY MANAGEMENT SYSTEM
# =============================================

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: library-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: library_management_system
      MYSQL_USER: library_user
      MYSQL_PASSWORD: library_password
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "3306:3306"
    volumes:
      - ./database/database_design.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./database/database_init.sql:/docker-entrypoint-initdb.d/setup.sql:ro

    networks:
      - library_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      timeout: 20s
      retries: 10
    command: --default-authentication-plugin=mysql_native_password

  # Redis Cache (Optional)
  redis:
    image: redis:7-alpine
    container_name: library-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - library_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Backend Node.js API
  backend-node:
    build:
      context: ./backend-node
      dockerfile: Dockerfile
    container_name: library-backend-node
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=library_management_system
      - JWT_SECRET=your_super_secret_jwt_key_here_change_in_production_123456789
      - FRONTEND_URL=http://localhost:3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "3001:3001"
    volumes:
      - backend_node_uploads:/app/uploads
      - backend_node_logs:/app/logs
    networks:
      - library_network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Backend Spring Boot API
  backend-spring:
    build:
      context: ./backend-spring
      dockerfile: Dockerfile
    container_name: library-backend-spring
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=production
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=library_management_system
      - JWT_SECRET=your_super_secret_jwt_key_here_change_in_production_123456789
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:3001
    ports:
      - "3002:3002"
    volumes:
      - backend_spring_logs:/app/logs
    networks:
      - library_network
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Frontend React
  frontend-react:
    build:
      context: ./frontend-react
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=http://localhost:3001
    container_name: library-frontend-react
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - library_network
    depends_on:
      - backend-node
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: library-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - library_network
    depends_on:
      - frontend-react
      - backend-node
      - backend-spring
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  backend_node_uploads:
    driver: local
  backend_node_logs:
    driver: local
  backend_spring_logs:
    driver: local

networks:
  library_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
